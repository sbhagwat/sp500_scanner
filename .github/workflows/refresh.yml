name: refresh

on:
  schedule:
    - cron: "0 22 * * 1-5"  # Weekdays 6pm EDT / 5pm EST — ~2h after US market close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch S&P 500 data
        run: python src/fetch.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: site
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --yes --skip-domain --token="$VERCEL_TOKEN"

      - name: Commit refreshed data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f site/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "refresh: $(date -u +%Y-%m-%d) data"
            git push
          fi
